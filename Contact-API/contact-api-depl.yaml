---
apiVersion: apps/v1
kind: Deployment
metadata:
   name: contact-api-depl
   namespace: dev   # ✅ Added namespace
spec:
 replicas: 2
 strategy:
    type: RollingUpdate
 selector:
   matchLabels:
     app: contact-api
 template:
   metadata:
      name: contact-api-pod
      labels:
        app: contact-api
   spec:
    containers:
       - name: contact-api-container
         image: mukeshrakh10/eks-contact-api-img
         ports:
           - containerPort: 1124
---
apiVersion: v1
kind: Service
metadata:
   name: contact-api-svc
   namespace: dev   # ✅ Added namespace
spec:
  selector:
    app: contact-api
  type: LoadBalancer
  ports:
   - port: 1124
     targetPort: 1124
---
