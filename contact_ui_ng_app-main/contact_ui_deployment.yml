---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-ui-app-deployment
  namespace: dev   # ✅ added namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contact-ui
  template:
    metadata:
      name: contact-ui-pod
      labels:
        app: contact-ui
    spec:
      containers:
      - name: contact-ui-container
        image: mukeshrakh10/eks-contact-ui-angular-img
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: contact-ui-svc
  namespace: dev   # ✅ added namespace
spec:
  type: LoadBalancer
  selector:
    app: contact-ui
  ports:
    - port: 80
      targetPort: 80
