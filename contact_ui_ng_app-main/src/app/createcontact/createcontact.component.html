<div class="col-md-6 offset-md-3">
    <div class="scrolling-text">
        <h2>❖ Create New Contact ❖</h2>
    </div>

    <form (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>Name</label>
            <input type="text" class="form-control" name="name" id="name" [(ngModel)]="contact.contactName">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="text" class="form-control" name="email" id="email" [(ngModel)]="contact.contactEmail">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" class="form-control" name="phone" id="phone" [(ngModel)]="contact.contactPhone">
        </div>
        <br>
        <div>
            <button class="btn btn-primary" type="submit">
                Submit
            </button>
        </div>
    </form>
</div>
